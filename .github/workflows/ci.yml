name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deterministic test dependencies
        run: python -m pip install -e ".[dev,mip]"
      - name: Verify required solver backends
        run: >-
          python -c "import cvxpy as cp;
          required = {'CLARABEL', 'HIGHS', 'SCIP'};
          missing = required - set(cp.installed_solvers());
          assert not missing, f'Missing required CI solvers: {sorted(missing)}'"
      - name: Lint
        run: python -m ruff check .
      - name: Test without live services
        env:
          ANTHROPIC_API_KEY: ""
        run: python -m pytest
